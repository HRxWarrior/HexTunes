name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      # 4. Get dependencies
      - name: Install Flutter dependencies
        run: flutter pub get

      # 5. Run analysis (non-blocking)
      - name: Analyze code
        run: flutter analyze --no-fatal-infos || true

      # 6. Build debug APK (always works, no signing needed)
      - name: Build Debug APK
        run: flutter build apk --debug

      # 7. Build release APK
      - name: Build Release APK
        run: flutter build apk --release --no-shrink

      # 8. Upload Debug APK artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: HexTunes-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      # 9. Upload Release APK artifact
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: HexTunes-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # 10. Create GitHub Release on tag push
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-debug.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
