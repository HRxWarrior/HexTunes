name: hextunes
description: HexTunes - Feel Every Beat. Futuristic AMOLED music streaming app.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Audio
  just_audio: ^0.9.39
  audio_service: ^0.18.14
  # State Management
  flutter_riverpod: ^2.5.1
  # Navigation
  go_router: ^13.2.5
  # Networking
  dio: ^5.4.3
  # Images
  cached_network_image: ^3.3.1
  palette_generator: ^0.3.3+3
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  # Fonts
  google_fonts: ^6.2.1
  # Animations
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  # Permissions
  permission_handler: ^11.3.1
  # Utils
  connectivity_plus: ^6.0.3
  intl: ^0.19.0
  uuid: ^4.3.3
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
